<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-size: 18px;
        color: white;
    }
    body {
        height: 200px;
    }
    header {
        width: 100%;
        height: 20%;
        background-color: purple;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .navigation {
        width: 100%;
        height: 20%;
        background-color: green;
        margin-top: 5px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .container {
        width: 100%;
        height: 50%;
        background-color: white;
        margin-top: 5px;
        display: flex;
        gap: 5px;
    }
    .left {
        width: 30%;
        height: 100%;
        background-color: greenyellow;
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
    }
    .right {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        gap: 5px;
    }
    .content, .section {
        width: 100%;
        height: 50%;
        background-color: blue;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .section {
        background-color: plum;
    }
    footer {
        width: 100%;
        height: 10%;
        background-color: brown;
        margin-top: 5px;
        text-align: center;
    }
</style>
<body>
    <header>Header</header>
    <div class="navigation">Navigation</div>

    <div class="container">
        <div class="left">Aside</div>

        <div class="right">
           <div class="content">Content</div>
           <div class="section">Section</div>
        </div>
    </div>

    <footer>Footer</footer>

</body>
</html>
