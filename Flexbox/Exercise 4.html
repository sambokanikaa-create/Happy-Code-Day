<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
    
    #mainbox {
        background-color: red;
        height: 300px;
        width: 300px;
        margin: 20px auto;
        padding: 10px;
        display: flex;
        column-gap: 10px;
    }
    #box1, #box3 {
        background-color: blue;
        width: 50%;
        height:100%; 
    }
    #box2, #box4 {
        background-color: yellow;
        width: 100%;
        height: 70%;
    }
    #boxT{
        height: 70%;
        width: 100%;
        background-color: green;
    }
    #boxB{
        height: 30%;
        width: 100%;
        background-color: rgb(163, 197, 12);
    }
    img{
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
   

</style>
<body>
    <div id="mainbox">
        <div id="box1">
                <div id="boxT">
                    <img src="../Asset/Image/iphone-17-lineup.jpg" alt="">
                </div>
                <div id="boxB"></div>
        </div>
        <div id="box3">
            <div id="boxT">
                    <img src="../Asset/Image/Laptop 1.jpg" alt="">
                </div>
                <div id="boxB"></div>
        </div>
    </div>
</body>
</html>
