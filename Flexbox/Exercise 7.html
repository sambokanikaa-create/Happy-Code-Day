<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 20px;
        color: honeydew;
    }
    body {
        width: 100%;
        height: 500px;
    }
    Header {
        width: 100%;
        height: 10%;
        background-color: aqua;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .container1 {
        width: 100%;
        height: 60%;
        margin-top: 5px;
        display: flex;
        gap: 5px;
    }
    .box1 {
        width: 30%;
        height: 100%;
    }
    .hero {
        width: 100%;
        height: 30%;
        background-color: rgb(203, 56, 203);
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .sidebar {
        width: 100%;
        height: 70%;
        background-color: rgb(61, 88, 61);
        margin-top: 5px;
        display: flex;
        justify-content: center;
        padding-top: 10px;
    }
    .box2 {
        width: 70%;
        height: 100%;
    }
    .main-content {
        width: 100%;
        height: 70%;
        background-color: #aea850;
    }
    .main-content h1 {
        display: flex;
        justify-content: center;
        padding-top: 10px;
    }
    .main-content p {
        font-size: 10px;
        text-align: center;
    }
    .extra-content {
        width: 100%;
        height: 30%;
        background-color: gray;
        margin-top: 5px;
        display: flex;
        justify-content: center;
        padding-top: 10px;
    }
    .container2 {
        width: 100%;
        height: 20%;
        display: flex;
        gap: 5px;
        margin-top: 10px;
    }
    .related-image{
        width: 70%;
        height: 100%;
        background-color: cadetblue;
        display: flex;
        justify-content: center;
        padding-top: 10px;
    }
    .related-post{
        width: 30%;
        height: 100%;
        background-color: palevioletred;
        display: flex;
        justify-content: center;
        padding-top: 10px;
    }
    footer {
        width: 100%;
        height: 10%;
        background-color: orange;
        margin-top: 5px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
</style>
<body>
    <Header>Header</Header>
    <div class="container1">
        <div class="box1">
            <div class="hero">Hero</div>
            <div class="sidebar">Sidebar</div>
        </div>
        <div class="box2">
            <div class="main-content">
                <h1>Main Content</h1>
                <p>We are too lazy to do job everyday without our parents and bro but I hate my nobody, honestly we don't need to be good.</p>
            </div>
            <div class="extra-content">Extra Content</div>
        </div>
    </div>
    <div class="container2">
        <div class="related-image">Related Images</div>
        <div class="related-post">Related Posts</div>
    </div>
    <footer>Footer</footer>
</body>
</html>
