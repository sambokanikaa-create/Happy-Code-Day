<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
    #main-box {
        background-color: red;
        height: 300px;
        width: 300px;
        margin: 20px auto;
        padding: 10px;
    }
    #box {
        background-color: blue;
        height: 100%; 
    }
    #h-box {
        background-color: green;
        height: 200px;
        width: 200px;
        margin: 20px auto;
        padding: 10px;
    }
    #bbox {
        background-color: yellow;
        height: 100%;
    }
</style>
<body>
    <div id="main-box">
        <div id="box"></div>
    </div>

    <div id="h-box">
        <div id="bbox"></div>
    </div>
</body>
</html>
