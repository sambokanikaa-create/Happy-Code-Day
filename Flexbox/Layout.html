<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">

</head>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
    .container {
        width: 100%;
        height: 500px;
        background-color: red;
        margin: 20px auto;
        padding: 10px;
        
    }
    header {
        width: 100%;
        height: 10%;
        background-color: rgb(164, 98, 164);
        display: flex;
    }
    header .logo {
        width: 20%;
        height: 100%;
        background-color: yellow;
    }
    header .web-header {
        width: 80%;
        height: 100%;
        background-color: green;
    }
    menu {
        width: 100%;
        height: 10%;
        background-color: orange;
    }
    article {
        width: 100%;
        height: 20%;
        display: flex;
    }
    article section {
        width: 33.33%;
        height: 100%;
    }
    article section:first-child, section:last-child {
        background-color: cyan;
    }

    block {
        width: 100%;
        height: 50%;
        display: flex;
    }
    block .page-content {
        width: 80%;
        height: 100%;
        background-color: pink;
    }
    block .side-bar {
        width: 20%;
        height: 100%;
        background-color: green;
    }
    footer {
        width: 100%;
        height: 10%;
        background-color: greenyellow;
    }
    .text {
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 20px;
        font-weight: 600;
        font-family: 'Oswald', sans-serif;
    }
</style>
<body>
    <div class="container">
        <header>
            <div class="logo text">Logo</div>
            <div class="web-header text">Website Header</div>
        </header>

        <menu>
            <div class="menu text">Menu</div>
        </menu>

        <article>
            <!-- <div class="section1 text">Section 1</div>
            <div class="section2 text">Section 2</div>
            <div class="section3 text">Section 3</div> -->
            <section class="section1 text">Section 1</section>
            <section class="section2 text">Section 2</section>
            <section class="section3 text">Section 3</section>
        </article>

        <block>
            <div class="page-content text">Page Content</div>
            <div class="side-bar text">Side Bar</div>
        </block>
       <footer>
            <div class="footer-content text">Footer Content</div>
       </footer>
    </div>
</body>
</html>
