<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    #mainbox{
        width: 400px;
        height: 400px;
        background-color: purple;
        border-radius: 20px;
        margin: 20px auto;
        padding: 20px;
    }
    #box1{
        width: 100%;
        height: 100%;
        background-color: purple;
        border-radius: 20px;
        display: flex;
        flex-direction: column-reverse;
        row-gap: 20px;
    }
    #boxA {
        width: 100%;
        height: 20%;
        background-color: white;
        border-radius: 20px;
        display: inline-block;
    }
    #boxB {
        width: 100%;
        height: 10%;
        background-color: lightgray;
        border-radius: 20px;
        display: inline-block;
    }
    #boxC {
        width: 100%;
        height: 70%;
        background-color: white;
        border-radius: 20px;
        display: inline-block;
    }
    #boxC img {
        width: 100%;
        height: 100%;
        border-radius: 20px;
    }
    #boxA audio {
        width: 100%;
        height: 100%;
    }  
</style>
<body>
    <center>
        <div id="mainbox">
        <div id="box1">
            <div id="boxA">
                <audio controls>
                    <source src="../Asset/Audio/Little Mix - Black Magic (Lyrics) (Underwater).mp3" type="audio/mpeg">
                </audio>
            </div>
            <div id="boxB">
                <h1 align="center" style="font-size: 20px; font-family: 'Times New Roman'; "
                >Black Magic (Underwater)</h1>
            </div>
            <div id="boxC">
                <img src="../Asset/Image/58f4bac7df14d8a3b4973a5f08abe42f.jpg" alt="">
            </div>
        </div>
    </div>
    </center>

</body>
</html>
