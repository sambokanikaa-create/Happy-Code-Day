<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    .container {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: 100px 100px 100px;
        gap: 5px;
    }
    .box {
        width: 100%;
        height: 100%;
        background-color: red;
    }
    .box1 {
        grid-row: 1/4 ;
    }
    .box2 {
        grid-column: 2/4;
    }
    .box6 {
        grid-row: 2/4;
        grid-column: 4/5;
    }
</style>
<body>
    <div class="container">
        <div class="box box1">1</div>
        <div class="box box2">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box box6">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
    </div>
</body>
</html>
