<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    .container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        /* if you use this the box don't use px use % */
        grid-template-rows: 100px 200px; 
        gap: 10px;
    }
    .box {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: aqua;
    }
    .box1 {
        /* grid-column: start/end; row the same
        check "gride column" for more imformation
        about counting number! */
        grid-column: 1/3;
    }
    .box4 {
        grid-column: 2/4;
        grid-row: 2/4;
    }
</style>
<body>
    <div class="container">
        <div class="box box1">1</div>
        <div class="box box2">2</div>
        <div class="box box3">3</div>
        <div class="box box4">4</div>
        <div class="box box5">5</div>
    </div>
</body>
</html>
