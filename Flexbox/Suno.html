<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
        color: white;
    }
    body {
        height: 100vh;
        width: 100vw;
        display: flex;
        gap: 1px;
    }
    .side-box {
        width: 20%;
        height: 100%;
        background-color: rgb(20, 19, 19);
    }
    .user-info {
        display: flex;
        gap: 7px;
        align-items: center;
    }
    .logo-name {
       margin-top: 30px;
       margin-left: 20px;
       
    }
    .user {
        margin-top: 30px;
        margin-left: 20px;
    }
    .user-img {
        width: 40px;
        height: 40px;
        border-radius: 40px;
        border: 1px solid wheat;
        /* background-color: blueviolet;
        box-shadow: 0 0 500px red; */
    }
    .user-img:hover {
        border: 20px solid #a5a5a5;
        cursor: pointer;
    }
    .user-name {
        font-size: 16px;
        color: #a8a4a4;
    }
    .user-credit {
        font-size: 12px;
        color: rgb(118, 120, 122);
    }
    .user-name:hover {
        color: blanchedalmond;
        cursor: pointer;
    }
    .user-credit:hover {
        color: blanchedalmond;
        cursor: pointer;
    }
    .user-btn {
        padding: 10px 40px;
        background-color: rgb(20, 19, 19);
        border-radius: 20px;
        border: 1px solid rgb(50, 50, 50);
        font-size: 15px;
        margin-top: 15px;
    }
    .user-btn:hover {
        background-color: rgb(35, 34, 34);
        cursor: pointer;
    }
    .userbar1, .userbar2 {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    a {
        text-decoration: none;
        color: #a8a4a4;
        margin-left: 15px;
    }
    a:hover {
        color:whitesmoke;
        cursor: pointer;
    }
    .userbar1 {
        margin: 0;
        padding: 0;
    }
    i {
        color: #a8a4a4;
    }

    .main-box {
        width: 80%;
        height: 100%;
        background-color: red;
    }

</style>
<body>
    <div class="side-box">
        <h1 class="logo-name">SUNO</h1>

        <div class="user">
            <div class="user-info">
                <img class="user-img" src="../Asset/Image/Roblox Woman Face.jpg" alt="">
                <div class="user-letter">
                    <p class="user-name">KlandCG</p>
                    <p class="user-credit">50 Credits</p>
                </div>
            </div>
            <button class="user-btn">Update to Pro</button>
        </div>

        <ul class="userbar1">
                <li>
                    <i class="fa-solid fa-house"></i>
                    <a href="">Home</a>
                </li>
                <li>
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <a href="">Explore</a>
                </li>
                <li>
                    <i class="fa-solid fa-music"></i>
                    <a href="">Create</a>
                </li>
                <li>
                    <i class="fa-solid fa-sliders"></i>
                    <a href="">Studio</a>
                </li>
                <li>
                    <i class="fa-solid fa-book"></i>
                    <a href="">Library</a>
                </li>
                <li>
                    <i class="fa-solid fa-layer-group"></i>
                    <a href="">Hooks</a>
                </li>
                <li>
                    <i class="fa-solid fa-bell"></i>
                    <a href="">Notifications</a>
                </li>
        </ul>

        <ul class="userbar2">
            <li>
                <i class="fa-solid fa-flask"></i>
                <a href="">Labs</a>
            </li>
            <li>
                <i class="fa-regular fa-newspaper"></i>
                <a href="">Terms & Policies</a>
            </li>
            <li>
                <i class="fa-solid fa-ellipsis"></i>
                <a href="">More</a>
            </li>
        </ul>
    </div>

    <div class="main-box">

    </div>>
</body>
</html>
