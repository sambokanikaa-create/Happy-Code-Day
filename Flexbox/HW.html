<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
    #mainbox {
        background-color: red;
        height: 300px;
        width: 300px;
        margin: 20px auto;
        padding: 10px;
        display: flex;
        flex-direction: column;
        row-gap: 10px;
    }
    #box1{
        background-color: yellow;
        height: 20%;
        width: 100%;
    }
    #box2 {
        background-color: #yellow;
        height: 10%;
        width: 100%;
        display: flex;
        column-gap: 10px;
    }
    #boxT, #boxY {
        background-color: #08e7f3;
        height: 100%;
        width: 50%;
    }
    #box3 {
        background-color: green;
        height: 50%;
        width: 100%;
    }
    #box4 {
        background-color: red;
        height: 10%;
        width: 100%;
        display: flex;
        column-gap: 10px;
    }
    #boxA, #boxB, #boxC {
        background-color: hsl(288, 94%, 49%);
        height: 100%;
        width: 33.33%;
    }


</style>
<body>
    <div id="mainbox">
        <div id="box1"></div>
        <div id="box2">
            <div id="boxT"></div>
            <div id="boxY"></div>
        </div>
        <div id="box3"></div>
        <div id="box4">
            <div id="boxA"></div>
            <div id="boxB"></div>
            <div id="boxC"></div>
        </div>
    </div>
</body>
</html>
