<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
    .container {
        width: 100%;
        height: 500px;
        display: grid;
        /* 1fr = frunction */
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        /* if the screen is smaller than 200px, it will be get down */
        grid-template-rows: 1fr 1fr 1fr;
        gap: 10px;
    }
    .box {
        width: 100%;
        height: 200px;
        background-color: grey;
    }
</style>
<body>
    <div class="container">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>
</html>
