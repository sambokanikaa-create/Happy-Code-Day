<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
    #background {
        width: 100%;
        height: 100vh;
        background-color: rgb(164, 98, 164);
        margin: 20px auto;
        padding: 10px;
        display: flex;
        flex-direction: column;
        row-gap: 20px;
    }
    #box1 {
        width: 100%;
        height: 20%;
        background-color: rgb(164, 98, 164);
    }
    #box2 {
        width: 100%;
        height: 80%;
        background-color: rgb(164, 98, 164);
        display: flex;
        column-gap: 20px;
    }
    #leftbox {
        width: 20%;
        height: 100%;
        background-color: purple;
        border-radius: 20px;
        padding: 20px;
        display: flex;
    }
    #boxA {
        width: 100%;
        height: 100%;
        background-color: #6565ba;
        display: flex;
        flex-direction: column;
        row-gap: 20px;
    }
    #boxa1, #boxa2, #boxa3, #boxa4, #boxa5 {
        width: 100%;
        height: 20%;
        background-color: white;
        border-radius: 20px;
    }
    #boxa1 a, #boxa2 a, #boxa3 a, #boxa4 a, #boxa5 a {
        display: block;
        /* Maybe for delete underline in <a> */
            /* text-decoration: none; for delete underline */
        width: 100%;
        height: 100%;
        text-align: center;
        line-height: 60px;
        font-size: 30px;
        font-family: 'Times New Roman', Times, serif;
        color: black;
        text-decoration: none;
    }
    #mainbox {
        width: 60%;
        height: 100%;
        background-color: lightgray;
        border-radius: 20px;
        padding: 20px;
        display: flex;
    }
    #boxX{
        width: 100%;
        height: 100%;
        background-color: red;
    }
    #rightbox {
        width: 20%;
        height: 100%;
        background-color: white;
        border-radius: 20px;
    }
</style>
<body>
    <div id="background">
        <div id="box1"></div>
        <div id="box2">
            <div id="leftbox">
                <div id="boxA">
                    <section id="boxa1"> <a href="./Time For Music.html">HOME</a></section>
                    <section id="boxa2"> <a href="./About Us.html">ABOUT US</a></section>
                    <section id="boxa3"> <a href="./Menu.html">MENU</a></section>
                    <section id="boxa4"> <a href="./Rewards.html">REWARDS</a></section>
                    <section id="boxa5"> <a href="./Contact.html">CONTACT</a></section>
                </div>
            </div>

            <div id="mainbox">
                <div id="boxX"></div>
            </div>

            <div id="rightbox"></div>
        </div>
    </div>
</body>
</html>
