<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<!-- class for css, id for java script Damm -->
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
    .container {
        width: 100%;
        height: 500px;
        margin: 20px auto;
        padding: 10px;
        display: flex;
        flex-direction: column;
        row-gap: 10px;
        background-color: whitesmoke;
    }
    header {
        width: 100%;
        height: 5%;
        background-color: orange;
        display: flex;
    }
    article {
        width: 100%;
        height: 5%;
        display: flex;
        column-gap: 10px;
    }
    article section {
        width: 40%;
        height: 100%;
        background-color: black;
    }  
    main {
        width: 100%;
        height: 80%;
        display: flex;
        column-gap: 10px;
    }
    main section {
        width: 33.33%;
        height: 100%;
    }
    main section:first-child {
        background-color: yellow;
    }
    main section:nth-child(2) {
        display: flex;
        flex-direction: column;
        row-gap: 10px;
    }
    main section:last-child {
        display: flex;
        flex-direction: column;
        row-gap: 10px;   
    }
    .box1 {
        width: 100%;
        height:20%;
        background-color: black;
    }
    .boxA {
        width: 100%;
        height: 50%;
        background-color: yellow;
    }
    footer {
        width: 100%;
        height: 10%;
        background-color: orange;
    }
    
</style>
<body>
    <div class="container">
        <header></header>
        <article>
            <section></section>
            <section></section>
            <section></section>
            <section></section>
            <section></section>
            <section></section>
            <section></section>
            <section></section>
            <section></section>
            <section></section>

        </article>
        
        <main>
            <section></section>        
            <section>
                <div class="boxA"></div>
                <div class="boxA"></div>
            </section>        
            <section>
                <div class="box1"></div>
                <div class="box1"></div>
                <div class="box1"></div>
                <div class="box1"></div>
                <div class="box1"></div>
                <div class="box1"></div>
                
            </section>        
        </main>
        <footer></footer>
    </div>
</body>
    <footer></footer>
    </div>
</body>
</html>
