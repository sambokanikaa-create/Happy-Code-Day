<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }
    body {
        height: 100vh;
        background-color: cornflowerblue;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    form {
        width: 400px;
        height: 500px;
        background-color: #fff;
        border: grey solid 1px;
        display: flex;
        flex-direction: column;
        padding: 20px;
        padding-top: 60px;
        border-radius: 10px;
    }
    h2 {
        text-align: center;
        margin-top: -20px;
    }
    input {
        padding: 10px;
        border-radius: 5px;
        border: 1px solid wheat;
        margin-top: 10px;
    }
    input:focus {
        outline: 1px solid
        cornflowerblue;
    }
    .signup-btn {
        padding: 10px;
        background-color: hsl(220, 96%, 59%);
        color: aliceblue;
        font-weight: 700;
        border: none;
        border-radius: 5px;
        margin-top: 10px;
    }
    .signup-btn:hover {
        background-color: blue;
    }
    .signup-btn:active {
        scale: 0.95;
        transition: all 0.2s ease-out;
    }
    p {
        color: gray;
        text-align: center;
        margin-top: 10px;
    }
    a {
        text-decoration: none;
        color: rgb(68, 68, 68);
    }
    .or {
        display: flex;
        justify-content: center;
        align-items: end;
        gap: 10px;
    }
    hr {
        width: 100%;
        border: 0.5px solid rgb(199, 199, 199);
    }
    .login {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 20px;
    }
    .flogin-btn {
        padding: 10px;
        background-color: hsl(220, 96%, 59%);
        color: aliceblue;
        border: none;
        border-radius: 5px;
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 80px;
         font-weight: 700;
        border: 1px solid black;
    }

    img {
        width: 20px;
        height: 20px;
        background-color: aliceblue;
        border-radius: 30px;
    }
    .glogin-btn {
        padding: 10px;
        background-color: whitesmoke;
        display: flex;
        align-items: center;
        gap: 70px;
        border: 1px solid rgb(188, 184, 184);
    }
    .flogin-btn p{
        color: aliceblue;
    }
    .glogin-btn p {
        color: black;
    }
</style>
<body>
    <form>
        <h2>Sign Up</h2>
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <input type="password" placeholder="Comfrim Password">
        <button class="signup-btn">Sign Up</button>
        
        <p>Already have account? <span><a href="">Login</a></span></p>

        <div class="or">
            <hr>
            <p>or</p>
            <hr>
        </div>

        <div class="login">
            <button class="flogin-btn">
                <img src="https://img.icons8.com/?size=100&id=118468&format=png&color=000000" alt="">
                <p>Login with Facebook</p>
            </button>
            <button class="glogin-btn">
                <img src="https://img.icons8.com/?size=100&id=17949&format=png&color=000000" alt="">
                <p>Login with Google</p>
            </button>
        </div>
    </form>
</body>
</html>
