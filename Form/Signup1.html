<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }
    body {
        height: 100vh;
        background-color: #b0b7ed;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .container {
        height: 500px;
        width: 800px;
        border-radius: 5px;
        background-color: white;
        display: flex;
    }
    .box1, .box2 {
        width: 400px;
        height: 500px;
        padding: 25px;
    }
    .box2 {
        display: flex;
        flex-direction: column;
    }
    img {
        width: 100%;
        height: 100%;
        border-radius: 5px;
    }
    .signin h2 {
        text-align: center;
        margin-top: 10px;
    }
    .signin p {
        text-align: center;
        margin-top: 10px;
    }
    .email p, .password p{
        color: red;
        margin-top: 20px;
    }
    .email span, .password span {
        color: black;
    }
    input {
        width: 300px;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid gray;
    }
    .signin-btn {
        width: 300px;
        padding: 10px;
        margin-top: 5px;
        border-radius: 10px;
        border: 1px solid gray;
        background-color: #1678ff;
        color: white;
        margin-top: 20px;
        font-weight: 700;
    }
    .acc-btn {
        width: 300px;
        padding: 10px;
        margin-top: 5px;
        border-radius: 10px;
        border: 1px solid gray;
        margin-top: 20px;
        font-weight: 700;
    }
</style>
<body>
    <div class="container">
        <div class="box1">
            <img src="..//Asset/Image/happy-man-ai-generated-portrait-user-profile_1119669-1.avif" alt="">
        </div>
        <div class="box2">
           <div class="signin">
             <h2>Sign In</h2>
             <p>Unlock your world.</p>
           </div>

            <div class="email">
                <p>* <span>Email</span></p>
                <input type="email" placeholder="Enter your email">
            </div>

            <div class="password">
                <p>* <span>Password</span></p>
                <input type="password" placeholder="Enter your password">
            </div>

            <button class="signin-btn">Sign In</button>
            <button class="acc-btn">Create an account</button>
        </div>
    </div>
</body>
</html>
