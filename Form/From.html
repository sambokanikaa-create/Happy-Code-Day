<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <label for="">Full Name</label>
        <input type="text" value="Home" placeholder="Input Name">
        <br>
        <label for="email">Email</label>
        <input type="email" name="email" placeholder="example@gmail.com">
        <br>
        <label for="phone">Phone</label>
        <input type="phone" name="phone" placeholder="Your Number">
        <br>
        <label for="file">File</label>
        <input type="file" name="file">
        <br>
        <label for="color">Color</label>
        <input type="color" name="color">
        <br>
        <label for="password">Password</label>
        <input type="password" name="password">
        <br>
        <label for="number">Number</label>
        <input type="number" name="number">
        <br>
        <label for="search">Search</label>
        <input type="search" name="search">
        <br>
        <label for="checkbox">Checkbox</label>
        <input type="checkbox" name="checkbox">
        <input type="checkbox" name="checkbox">
        <br>

        <br>
        <label for="select">Question : What is your gender?</label>
        <br>
        <input type="radio" name="gender" id="male">
        <label for="male">Male</label>
        <input type="radio" name="gender" id="female">
         <label for="female">Female</label>
        <input type="radio" name="gender" id="gray">
        <label for="gray">Gray</label>

        <br>
        <label for="url">URL</label>
        <input type="url" name="url" placeholder="https://example.com">
        
        <br>
        <label for="select">Where do you live?</label>
        <select name="id" id="">
            <option value="1">None</option>
            <option value="2">Phonm Penh</option>
            <option value="3">Battambong</option>
        </select>

        <br>
        <label for="year">Date Of Submit</label>
        <input type="date">
        <input type="time">

        <br>
        <input type="reset" value="Reset">
        <input type="submit" value="Submit">
        <input type="button" value="Skip">
        <input type="range">
        <input type="readonly" value="Readonly">
        <input type="button" value="No Thanks">
        
    </form>
</body>
</html>
