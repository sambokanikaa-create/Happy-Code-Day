<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color Button</title>
  <style>
    .color {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: Arial, sans-serif;
    }

    .color-button {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #333;
      background-color: red; /* button color */
      cursor: pointer;
    }

    /* Optional hover effect */
    .color-button:hover {
      transform: scale(1.1);
      border-color: #555;
    }
  </style>
</head>
<body>
  <div class="color">
    <p>Color</p>
    <div class="color-button"></div>
    <div><p>red</p></div>
  </div>
</body>
</html>
