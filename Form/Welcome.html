<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
    .container {
        width: 100%;
        height: 500px;
        margin: 20px auto;
        padding: 10px;
        display: flex;
        flex-direction: column;
        row-gap: 10px;
        background-color: whitesmoke;
    }
    header {
        width: 100%;
        height: 10%;
        background-color: black;
    }
    main {
        width: 100%;
        height: 70%;
        background-color: grey;
    }
    article {
        width: 100%;
        height: 10%;
        background-color: black;
    }
    footer {
        width: 100%;
        height: 10%;
        background-color: black;
    }
    .text {
        font-size: 20px;
        color: white;
        text-align: center;
        padding: 5px;
    }
</style>
<body>
    <div class="container">
        <header>
            <div class="text">Welcome To NU</div>
        </header>
        <main>
            <div class="text">Please Compelete the Infromation 
                <br>
                <label for="student_id">Student ID</label>
                <input type="number" name="student_id">
                <br>
                <label for="name">Full Name</label>
                <input type="text" name="name">
                <br>
                <input type="radio" name="gender" id="male">
                <label for="male">Male</label>
                <input type="radio" name="gender" id="female">
                <label for="female">Female</label>
                <br>
                <label for="password">Password</label>
                <input type="password" name="password" length="8" id="">
                <input type="submit">
            </div>
        </main>
        <article></article>
        <footer></footer>
    </div>
</body>
</html>
