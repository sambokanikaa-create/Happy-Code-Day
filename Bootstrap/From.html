<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<login>
    <form class="bg-white w-25 m-auto p-3 mt-5" style="border-radius: 10px; border: 1px solid rgb(143, 141, 141);">
        <h2>Login</h2>
        <divn class="mt-5"> 
            <div class="mb-3">
              <label for="exampleInputEmail1" class="form-label">Email address</label>
              <input type="email" class="form-control" id="email" placeholder="Enter your email.">
            </div>
            <div class="mb-3">
               <label for="username" class="form-label">Username</label>
               <input type="text" class="form-control" id="username" placeholder="Enter your username.">
            </div>

            <div class="mb-3 ">
               <label for="gender" class="form-label"></label>
            <select style="border:none">
                <option value="" disabled selected>Select Your Gender</option>
                <option value="">Male</option>
                <option value="">Female</option>
                <option value="">Gay</option>
            </select>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" placeholder="Enter your password.">
            </div>
            <div class="mb-3">
              <label for="confirmPassword" class="form-label">Confirm Password</label>
              <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm your password.">
            </div>

            <div>   
                <button class="bg-info w-100" style="border: none; color: white; padding: 10px 20px; border-radius: 5px;">Login</button>
            </div>

            <div class="form-check form-switch mt-3">
                <input class="form-check-input" type="checkbox" role="switch" id="switchCheckDefault">
                <label class="form-check-label" for="switchCheckDefault">Remember me</label>
            </div>

            <p class="mt-3">Already have an account? <a style="text-decoration: none;" href="#">Login</a></p>
        </divn>
    </form>
        
</login>
</body>
</html>
