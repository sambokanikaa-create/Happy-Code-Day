<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
    #div1 {
        background-color: #9f73b2;
        height: 200px;
        width: 200px;
        padding: 100px;
    }
    #div2 {
        margin: 5px auto;
        background-color: #f0c8e0;
        height: 400px;
        width: 300px; 
        margin: 50px;
    }
    /* <!-- magin : if 100px it means stay the same, 
        but 100% meaing it might change to the size of the device--> */
    #div3 {
        background-color: #f0c8e0;
        height: 100px;
        max-width: 900px;
    }
</style>
<body>
    <div id="div1"></div>
    <div id="div2"></div>
    \<div id="div3"></div>
</body>
</html>
